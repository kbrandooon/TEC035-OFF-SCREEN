name: CI

on:
  pull_request:
    branches: [development, staging, main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Format Check
        run: bun run format:check

      - name: Type Check & Build
        run: bun run build

      - name: Check for unused code
        run: bun run knip
